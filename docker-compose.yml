services:
  postgres_source:
    image: postgres:15
    container_name: postgres_source
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./sql/init_postgres.sh:/docker-entrypoint-initdb.d/init_postgres.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1gb
        reservations:
          memory: 512mb

  clickhouse:
    image: clickhouse/clickhouse-server
    container_name: clickhouse_warehouse
    environment:
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=jaxonator
    ports:
      - "8123:8123" # HTTP (for Python)
      - "9000:9000" # ClickHouse native protocol
    volumes:
      - ./clickhouse_data:/var/lib/clickhouse
      - ./sql/init_clickhouse.sql:/docker-entrypoint-initdb.d/init_clickhouse.sql
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    deploy:
      resources:
        limits:
          memory: 1gb
        reservations:
          memory: 512mb

  airflow:
    build: .
    container_name: airflow_orchestrator
    command: standalone
    env_file: .env
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_source/airflow_meta
      - AIRFLOW__CORE__PARALLELISM=4
      - AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG=1
      - AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG=1
      - AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL=30
      - AIRFLOW__SCHEDULER__MAX_TIS_PER_QUERY=4
      - AIRFLOW__WEBSERVER__WORKERS=2
      - AIRFLOW__WEBSERVER__WORKER_REFRESH_INTERVAL=1800
      - INSTRUMENT_COUNT=${INSTRUMENT_COUNT:-50}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/dags/scripts
    depends_on:
      postgres_source:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2gb
        reservations:
          memory: 1gb
